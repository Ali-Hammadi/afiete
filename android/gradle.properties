org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
kotlin.incremental=true
android.useAndroidX=true

# Improve dependency download resilience on unstable networks.
org.gradle.internal.http.connectionTimeout=120000
org.gradle.internal.http.socketTimeout=120000
org.gradle.internal.repository.max.retries=8
org.gradle.internal.repository.initial.backoff=1000

# Prefer IPv4 to avoid intermittent IPv6/DNS path issues on some networks.
systemProp.java.net.preferIPv4Stack=true
systemProp.java.net.preferIPv6Addresses=false
