openapi: 3.0.3
info:
  title: Afiete API
  version: 2.0.0
  description: OpenAPI contract aligned with the current Flutter client and the new backend database.
servers:
  - url: https://workserveys.pythonanywhere.com
paths:
  /api/users/login/:
    post:
      tags: [Auth]
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/token/:
    post:
      tags: [Auth]
      operationId: obtainToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: JWT pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
  /api/token/refresh/:
    post:
      tags: [Auth]
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
  /api/token/verify/:
    post:
      tags: [Auth]
      operationId: verifyToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenVerifyRequest"
      responses:
        "200":
          description: Token verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/users/otp/resend:
    post:
      tags: [Auth]
      operationId: resendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/users/otp/verify:
    post:
      tags: [Auth]
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: OTP accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/users/email-change/request:
    post:
      tags: [Auth]
      operationId: requestEmailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailChangeRequest"
      responses:
        "200":
          description: Email change request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/users/email-change/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailChangeConfirmRequest"
      responses:
        "200":
          description: Email change confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/patients/google/auth/:
    post:
      tags: [Auth]
      operationId: googleLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: Google sign-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/auth/delete-account:
    post:
      tags: [Auth]
      operationId: deleteAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/patients/register/:
    post:
      tags: [Patients]
      operationId: registerPatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientRegisterRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/patients/profile/:
    put:
      tags: [Patients]
      operationId: updatePatientProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientProfileUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    patch:
      tags: [Patients]
      operationId: patchPatientProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientProfileUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/doctors/register/:
    post:
      tags: [Doctors]
      operationId: registerDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorRegisterRequest"
      responses:
        "201":
          description: Doctor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
  /api/doctors/profile/update:
    put:
      tags: [Doctors]
      operationId: updateDoctorProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorProfileUpdateRequest"
      responses:
        "200":
          description: Updated doctor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorProfileResponse"
    patch:
      tags: [Doctors]
      operationId: patchDoctorProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorProfileUpdateRequest"
      responses:
        "200":
          description: Updated doctor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorProfileResponse"
  /api/doctors/profile/education/:
    get:
      tags: [Doctors]
      operationId: listDoctorEducation
      responses:
        "200":
          description: Education list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DoctorEducation"
    post:
      tags: [Doctors]
      operationId: createDoctorEducation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorEducation"
      responses:
        "201":
          description: Education created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorEducation"
  /api/doctors/profile/education/{id}/:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags: [Doctors]
      operationId: retrieveDoctorEducation
      responses:
        "200":
          description: Education item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorEducation"
    put:
      tags: [Doctors]
      operationId: updateDoctorEducation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorEducation"
      responses:
        "200":
          description: Education updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorEducation"
    patch:
      tags: [Doctors]
      operationId: patchDoctorEducation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorEducation"
      responses:
        "200":
          description: Education updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorEducation"
    delete:
      tags: [Doctors]
      operationId: deleteDoctorEducation
      responses:
        "204":
          description: No content
  /api/doctors:
    get:
      tags: [Doctors]
      operationId: listDoctors
      parameters:
        - in: query
          name: specialization
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Doctor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
  /api/doctors/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags: [Doctors]
      operationId: retrieveDoctor
      responses:
        "200":
          description: Doctor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
  /api/doctors/{id}/articles/:
    get:
      tags: [Articles]
      operationId: listDoctorArticles
      responses:
        "200":
          description: Articles by doctor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
  /api/articles/:
    get:
      tags: [Articles]
      operationId: listArticles
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: page_size
          schema:
            type: integer
      responses:
        "200":
          description: Article list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
  /api/articles/{id}/:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      tags: [Articles]
      operationId: retrieveArticle
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
  /api/articles/{id}/like/:
    post:
      tags: [Articles]
      operationId: likeArticle
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
  /api/articles/{id}/dislike/:
    post:
      tags: [Articles]
      operationId: dislikeArticle
      responses:
        "200":
          description: Dislike toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
  /api/appointments/list:
    get:
      tags: [Appointments]
      operationId: listAppointments
      responses:
        "200":
          description: Appointment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
  /api/appointments/create:
    post:
      tags: [Appointments]
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreateRequest"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
  /api/appointments/cancel:
    post:
      tags: [Appointments]
      operationId: cancelAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCancelRequest"
      responses:
        "200":
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/appointments/reschedule:
    post:
      tags: [Appointments]
      operationId: rescheduleAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRescheduleRequest"
      responses:
        "200":
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
  /api/sessions/upcoming:
    get:
      tags: [Sessions]
      operationId: listUpcomingSessions
      responses:
        "200":
          description: Upcoming sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
  /api/sessions/past:
    get:
      tags: [Sessions]
      operationId: listPastSessions
      responses:
        "200":
          description: Past sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
  /api/sessions/join:
    post:
      tags: [Sessions]
      operationId: joinSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionJoinRequest"
      responses:
        "200":
          description: Session joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /api/sessions/cancel:
    post:
      tags: [Sessions]
      operationId: cancelSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCancelRequest"
      responses:
        "200":
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/sessions/reschedule:
    post:
      tags: [Sessions]
      operationId: rescheduleSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRescheduleRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /api/sessions/review:
    post:
      tags: [Sessions]
      operationId: reviewSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionReview"
  /api/assignments/questions:
    get:
      tags: [Assignments]
      operationId: listAssignmentQuestions
      responses:
        "200":
          description: Question list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignmentQuestion"
  /api/assignments/submit:
    post:
      tags: [Assignments]
      operationId: submitAssignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentSubmitRequest"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentResult"
  /api/settings/medical-profile:
    get:
      tags: [Settings]
      operationId: getMedicalProfile
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Medical profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalProfile"
  /api/settings/medical-profile/notes:
    patch:
      tags: [Settings]
      operationId: updateMedicalNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdateRequest"
      responses:
        "200":
          description: Updated medical profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalProfile"
  /api/settings/medical-profile/notes/share:
    post:
      tags: [Settings]
      operationId: shareMedicalNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareNoteRequest"
      responses:
        "200":
          description: Share confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/settings/reports:
    post:
      tags: [Settings]
      operationId: submitSettingsReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsReportRequest"
      responses:
        "200":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/reports/submit:
    post:
      tags: [Reports]
      operationId: submitReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportSubmitRequest"
      responses:
        "200":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
  /api/reports/history:
    get:
      tags: [Reports]
      operationId: reportHistory
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
  /api/reports/by-type:
    get:
      tags: [Reports]
      operationId: reportsByType
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: reportType
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report list by type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
  /voice/calls:
    get:
      tags: [Calls]
      operationId: listVoiceCalls
      parameters:
        - in: query
          name: patientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Voice calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"
  /voice/calls/start:
    post:
      tags: [Calls]
      operationId: startVoiceCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCallRequest"
      responses:
        "200":
          description: Voice call started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
  /voice/calls/{callId}/end:
    post:
      tags: [Calls]
      operationId: endVoiceCall
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Voice call ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
  /video/calls:
    get:
      tags: [Calls]
      operationId: listVideoCalls
      parameters:
        - in: query
          name: patientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"
  /video/calls/start:
    post:
      tags: [Calls]
      operationId: startVideoCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCallRequest"
      responses:
        "200":
          description: Video call started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
  /video/calls/{callId}/end:
    post:
      tags: [Calls]
      operationId: endVideoCall
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video call ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
components:
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            oneOf:
              - type: array
                items:
                  type: string
              - type: string
    UserResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
    UserAuthResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        name:
          type: string
        nickname:
          type: string
        birthDate:
          type: string
          format: date
        birth_date:
          type: string
          format: date
        gender:
          type: string
        phoneNumber:
          type: string
        phone:
          type: string
        isVerified:
          type: boolean
        is_verified:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    TokenRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    TokenPair:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
    AccessTokenResponse:
      type: object
      properties:
        access:
          type: string
        data:
          type: object
          properties:
            access:
              type: string
    TokenRefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string
    TokenVerifyRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    ResendOtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    VerifyOtpRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
    EmailChangeRequest:
      type: object
      required: [new_email]
      properties:
        new_email:
          type: string
          format: email
    EmailChangeConfirmRequest:
      type: object
      required: [new_email, otp]
      properties:
        new_email:
          type: string
          format: email
        otp:
          type: string
    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
    DeleteAccountRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    PatientRegisterRequest:
      type: object
      required: [user]
      properties:
        user:
          type: object
          required: [email, password]
          properties:
            email:
              type: string
            password:
              type: string
            nickname:
              type: string
    DoctorRegisterRequest:
      type: object
      required: [user]
      properties:
        user:
          type: object
          required: [email, password]
          properties:
            email:
              type: string
            password:
              type: string
            first_name:
              type: string
            last_name:
              type: string
    PatientProfileUpdateRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            birth_date:
              type: string
              format: date
            gender:
              type: string
            phone:
              type: string
        psychological_history:
          type: string
    DoctorProfileUpdateRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            birth_date:
              type: string
              format: date
            gender:
              type: string
            phone:
              type: string
        job_title:
          type: object
          properties:
            title:
              type: string
        experience:
          type: integer
        specialization:
